sonar.projectKey=EKINSOL-DEV_crewhub2
sonar.organization=ekinsol-dev
sonar.projectName=CrewHub v2

# Sources: React frontend + Rust core
sonar.sources=src,src-tauri/src
sonar.exclusions=src/ipc/bindings.ts,dist/**,src-tauri/target/**,node_modules/**

# Tests (directories land in M0 Tasks 2/6; harmless until then)
sonar.test.inclusions=src/test/**,e2e/**

sonar.sourceEncoding=UTF-8

# Coverage & external reports (CI-based scan)
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.rust.lcov.reportPaths=src-tauri/lcov.info
sonar.rust.clippy.reportPaths=src-tauri/clippy-report.json
sonar.coverage.exclusions=src/test/**,e2e/**,src/components/ui/**
