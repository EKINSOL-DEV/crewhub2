name: CI
on:
  pull_request:
  push:
    branches: [main]

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm prettier --check .
      - run: pnpm eslint .
      - run: pnpm tsc --noEmit
      - run: pnpm vitest run

  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Tauri system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libgtk-3-dev
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: .
      - run: cargo fmt --check --manifest-path src-tauri/Cargo.toml
      - run: cargo clippy --manifest-path src-tauri/Cargo.toml -- -D warnings
      - run: cargo test --manifest-path src-tauri/Cargo.toml
      - name: Bindings drift check
        run: git diff --exit-code src/ipc/bindings.ts

  build-macos:
    runs-on: macos-latest
    needs: [frontend, rust]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: .
      - run: pnpm install --frozen-lockfile
      - run: pnpm tauri build --debug --no-bundle

  e2e-linux:
    runs-on: ubuntu-latest
    needs: [frontend, rust]
    steps:
      - uses: actions/checkout@v4
      - name: System deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev webkit2gtk-driver xvfb
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: .
      - run: pnpm install --frozen-lockfile
      - name: Install tauri-driver
        run: cargo install tauri-driver --locked
      - run: pnpm tauri build --debug --no-bundle
      - run: xvfb-run pnpm e2e

  sonar:
    runs-on: ubuntu-latest
    needs: [frontend, rust]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Tauri system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libgtk-3-dev
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@cargo-llvm-cov
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: .
      - run: pnpm install --frozen-lockfile
      - name: Frontend coverage
        run: pnpm vitest run --coverage
      - name: Rust coverage (lcov)
        run: cargo llvm-cov --manifest-path src-tauri/Cargo.toml --lcov --output-path src-tauri/lcov.info
      - name: Clippy report for Sonar
        run: cargo clippy --manifest-path src-tauri/Cargo.toml --message-format=json > src-tauri/clippy-report.json || true
      - name: SonarQube scan
        uses: sonarsource/sonarqube-scan-action@v5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
